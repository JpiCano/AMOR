<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 A Tu Lado Soy Feliz 💕</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Poppins:wght@400;600;700&family=Dancing+Script:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 105, 180, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(219, 112, 147, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: linear-gradient(135deg, #fff5f8 0%, #ffe0f0 50%, #fff0f7 100%);
            border-radius: 40px;
            padding: 70px 50px;
            box-shadow:
                0 30px 60px rgba(233, 127, 168, 0.35),
                0 0 100px rgba(255, 20, 147, 0.15),
                inset 0 0 40px rgba(255, 255, 255, 0.8);
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 184, 210, 0.6);
            animation: cardFloat 4s ease-in-out infinite;
            overflow: hidden;
        }

        @keyframes cardFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at top right, rgba(255, 182, 193, 0.3), transparent 70%);
            pointer-events: none;
        }

        /* Decoraciones de esquinas */
        .decoration {
            position: absolute;
            font-size: 40px;
            opacity: 0.8;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.3));
        }

        .deco-top-left {
            top: 15px;
            left: 15px;
            animation-delay: 0s;
        }

        .deco-top-right {
            top: 15px;
            right: 15px;
            animation-delay: 0.5s;
        }

        .deco-bottom-left {
            bottom: 15px;
            left: 15px;
            animation-delay: 1s;
        }

        .deco-bottom-right {
            bottom: 15px;
            right: 15px;
            animation-delay: 1.5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }
        }

        /* Línea con flechas y corazones */
        .line-decoration {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 35px 0;
            font-size: 28px;
            gap: 12px;
        }

        .line-decoration span {
            animation: heartbeat 1.4s ease-in-out infinite;
            filter: drop-shadow(0 2px 4px rgba(255, 20, 147, 0.2));
        }

        .line-decoration span:nth-child(1),
        .line-decoration span:nth-child(5) {
            animation: slidePulse 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            50% {
                transform: scale(1);
            }
        }

        @keyframes slidePulse {

            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.15);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 60px;
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 50%, #ff1493 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 30px 0;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 20, 147, 0.3);
            filter: drop-shadow(0 5px 10px rgba(233, 127, 168, 0.2));
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {

            0%,
            100% {
                filter: drop-shadow(0 5px 10px rgba(233, 127, 168, 0.2));
            }

            50% {
                filter: drop-shadow(0 8px 20px rgba(233, 127, 168, 0.4));
            }
        }

        .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            background: linear-gradient(135deg, #c2185b 0%, #e91e63 50%, #c2185b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 35px 0 25px 0;
            font-weight: 700;
            filter: drop-shadow(0 5px 10px rgba(233, 127, 168, 0.2));
            animation: subtitleGlow 3s ease-in-out infinite;
            animation-delay: 0.2s;
        }

        @keyframes subtitleGlow {

            0%,
            100% {
                filter: drop-shadow(0 5px 10px rgba(233, 127, 168, 0.2));
            }

            50% {
                filter: drop-shadow(0 8px 20px rgba(233, 127, 168, 0.4));
            }
        }

        .message {
            font-size: 18px;
            color: #666;
            margin: 25px 0;
            line-height: 1.8;
            font-weight: 400;
            letter-spacing: 0.5px;
            animation: messageFloat 4s ease-in-out infinite;
        }

        @keyframes messageFloat {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.8;
            }

            50% {
                transform: translateY(4px);
                opacity: 1;
            }
        }

        /* Corazones flotantes */
        .floating-hearts {
            position: relative;
            height: 120px;
            margin: 40px 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            opacity: 0;
            animation: rise 4s ease-in forwards;
            filter: drop-shadow(0 0 8px rgba(255, 20, 147, 0.4));
        }

        @keyframes rise {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-120px) translateX(var(--tx, 0)) rotate(360deg);
            }
        }

        /* Botón interactivo */
        .love-button {
            background: linear-gradient(135deg, #ff1493, #ff69b4, #ffb6d9);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 35px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Poppins', sans-serif;
            box-shadow:
                0 15px 35px rgba(255, 20, 147, 0.4),
                0 0 30px rgba(255, 20, 147, 0.2);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            animation: buttonPulse 2s ease-in-out infinite;
        }

        @keyframes buttonPulse {

            0%,
            100% {
                box-shadow:
                    0 15px 35px rgba(255, 20, 147, 0.4),
                    0 0 30px rgba(255, 20, 147, 0.2);
            }

            50% {
                box-shadow:
                    0 15px 35px rgba(255, 20, 147, 0.6),
                    0 0 40px rgba(255, 20, 147, 0.4);
            }
        }

        .love-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow:
                0 20px 45px rgba(255, 20, 147, 0.6),
                0 0 50px rgba(255, 20, 147, 0.4);
            letter-spacing: 2px;
        }

        .love-button:active {
            transform: translateY(-2px) scale(0.98);
        }

        .love-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .love-button:hover::before {
            left: 100%;
        }

        /* Efecto de confeti */
        .confetti {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            animation: confetti-fall 3s forwards;
            filter: drop-shadow(0 0 5px rgba(255, 20, 147, 0.5));
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(0) rotateX(0) rotateY(0) rotateZ(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(400px) rotateX(360deg) rotateY(360deg) rotateZ(720deg);
            }
        }

        /* Efecto de click */
        .click-effect {
            position: fixed;
            pointer-events: none;
            font-size: 40px;
            animation: click-float 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            font-weight: 700;
            filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.6));
        }

        @keyframes click-float {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateY(-80px) scale(2) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .card {
                padding: 50px 30px;
                border-radius: 30px;
                animation: cardFloat 3s ease-in-out infinite;
            }

            .title {
                font-size: 48px;
            }

            .subtitle {
                font-size: 40px;
            }

            .decoration {
                font-size: 35px;
            }

            .line-decoration {
                font-size: 24px;
            }

            .message {
                font-size: 16px;
            }

            .love-button {
                padding: 16px 45px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            body {
                background-size: 300% 300%;
            }

            .card {
                padding: 35px 20px;
                border-radius: 25px;
                box-shadow:
                    0 20px 40px rgba(233, 127, 168, 0.3),
                    0 0 60px rgba(255, 20, 147, 0.1),
                    inset 0 0 30px rgba(255, 255, 255, 0.6);
            }

            .title {
                font-size: 36px;
                margin: 15px 0;
            }

            .subtitle {
                font-size: 28px;
                margin: 20px 0 15px 0;
            }

            .message {
                font-size: 15px;
                margin: 15px 0;
            }

            .decoration {
                font-size: 28px;
            }

            .line-decoration {
                font-size: 20px;
                margin: 20px 0;
            }

            .love-button {
                padding: 14px 35px;
                font-size: 16px;
                margin-top: 25px;
            }

            .floating-hearts {
                height: 80px;
                margin: 25px 0;
            }
        }

        @media (max-width: 360px) {
            .card {
                padding: 25px 15px;
            }

            .title {
                font-size: 28px;
            }

            .subtitle {
                font-size: 22px;
            }

            .decoration {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- Decoraciones de esquinas -->
            <div class="decoration deco-top-left">💕</div>
            <div class="decoration deco-top-right">💕</div>
            <div class="decoration deco-bottom-left">💕</div>
            <div class="decoration deco-bottom-right">💕</div>

            <!-- Primera línea decorativa -->
            <div class="line-decoration">
                <span>➜</span>
                <span>💗</span>
                <span>💗</span>
                <span>💗</span>
                <span>➜</span>
            </div>

            <!-- Título principal -->
            <h1 class="title">A tu lado soy feliz</h1>

            <!-- Segunda línea decorativa -->
            <div class="line-decoration">
                <span>⬅</span>
                <span>💖</span>
                <span>⬅</span>
            </div>

            <!-- Subtítulo -->
            <h2 class="subtitle">¡Te amo, mi vida!</h2>

            <!-- Tercera línea decorativa -->
            <div class="line-decoration">
                <span>➜</span>
                <span>❤️</span>
                <span>❤️</span>
                <span>❤️</span>
                <span>➜</span>
            </div>

            <!-- Mensaje -->
            <p class="message">Cada momento contigo es especial y lleno de amor</p>

            <!-- Corazones flotantes -->
            <div class="floating-hearts" id="floatingHearts"></div>

            <!-- Botón interactivo -->
            <button class="love-button" id="loveBtn">💖 ¡Tócame! 💖</button>
        </div>
    </div>

    <script>
        const loveBtn = document.getElementById('loveBtn');
        const floatingHearts = document.getElementById('floatingHearts');

        const heartEmojis = ['❤️', '💖', '💕', '💗', '💝', '🌹'];

        // Crear corazones flotantes continuamente
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.setProperty('--tx', (Math.random() - 0.5) * 150 + 'px');
            floatingHearts.appendChild(heart);

            setTimeout(() => heart.remove(), 4000);
        }

        // Generar corazones cada 600ms
        setInterval(createFloatingHeart, 600);

        // Función para crear confeti mejorado
        function createConfetti(x, y) {
            const confettiPieces = ['❤️', '💖', '💕', '💗', '💝', '✨', '🎉', '⭐', '🌟', '🎊'];
            for (let i = 0; i < 18; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = confettiPieces[Math.floor(Math.random() * confettiPieces.length)];
                confetti.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
                confetti.style.top = (y + (Math.random() - 0.5) * 50) + 'px';
                confetti.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Función para crear efecto de click mejorado
        function createClickEffect(x, y) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const effect = document.createElement('div');
                    effect.className = 'click-effect';
                    effect.textContent = '💖';
                    effect.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
                    effect.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
                    document.body.appendChild(effect);

                    setTimeout(() => effect.remove(), 1200);
                }, i * 50);
            }
        }

        // Evento del botón mejorado
        loveBtn.addEventListener('click', function(e) {
            const rect = loveBtn.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;

            // Crear confeti
            createConfetti(x, y);

            // Crear efecto de click
            createClickEffect(x, y);

            // Vibración (si el dispositivo lo soporta)
            if (navigator.vibrate) {
                navigator.vibrate([20, 30, 20, 40, 20]);
            }

            // Efecto visual del botón
            loveBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                loveBtn.style.transform = '';
            }, 150);

            // Crear sonido visual
            createSoundRipple(x, y);
        });

        // Crear riple de sonido
        function createSoundRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            ripple.style.borderRadius = '50%';
            ripple.style.border = '2px solid rgba(255, 20, 147, 0.8)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleEffect 0.8s ease-out forwards';
            document.body.appendChild(ripple);

            setTimeout(() => ripple.remove(), 800);
        }

        // Agregar animación de ripple al CSS dinámicamente
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleEffect {
                0% {
                    width: 20px;
                    height: 20px;
                    opacity: 1;
                    transform: translate(-50%, -50%);
                }
                100% {
                    width: 100px;
                    height: 100px;
                    opacity: 0;
                    transform: translate(-50%, -50%);
                }
            }
        `;
        document.head.appendChild(style);

        // Crear confeti al hacer click/tap en cualquier parte de la tarjeta
        document.querySelector('.card').addEventListener('dblclick', function(e) {
            createConfetti(e.clientX, e.clientY);
        });

        // Efecto de parallax en el mouse move
        document.addEventListener('mousemove', function(e) {
            const card = document.querySelector('.card');
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            
            card.style.transform = `perspective(1000px) rotateX(${y}deg) rotateY(${x}deg)`;
        });

        // Reset parallax cuando sale del viewport
        document.addEventListener('mouseout', function() {
            const card = document.querySelector('.card');
            card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
        });

        // Mensajes aleatorios al pasar mouse
        const messages = [
            '¡Te amo mucho! 💘',
            'Eres mi todo ❤️',
            '¡Siempre contigo! 💕',
            '¡Eres lo mejor! 💖',
            'Mi amor por ti es infinito 🌹',
            '¡Contigo soy feliz! 😊',
            '¡Te quiero! 💝'
        ];

        let lastMessageTime = 0;
        loveBtn.addEventListener('mouseenter', function() {
            const now = Date.now();
            if (now - lastMessageTime > 500) {
                const randomMessage = messages[Math.floor(Math.random() * messages.length)];
                lastMessageTime = now;
            }
        });

        // Crear corazones iniciales
        for (let i = 0; i < 3; i++) {
            setTimeout(createFloatingHeart, i * 600);
        }

        // Añadir interactividad al cargar
        window.addEventListener('load', function() {
            createConfetti(window.innerWidth / 2, window.innerHeight / 2);
        });
    </script>
</body>

</html>
